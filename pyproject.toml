[tool.poetry]
name = "strolidlib"
version = "0.1.0"
description = "Shared utilities for Strolid Conserver links"
authors = ["Strolid Dev Team <eng@strolid.com>"]
packages = [{include = "strolidlib"}]

[tool.poetry.dependencies]
python = ">=3.12,<3.13"
nemo_toolkit = {version = ">=2.5.2,<3.0.0", extras = ["asr"], optional = true}

[tool.poetry.extras]
langid = ["nemo_toolkit"]

[tool.poetry.group.dev.dependencies]
pytest = "^8.4.2"
black = "^24.10.0"
flake8 = "^7.1.1"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

